name: Build HarmonyOS App with Fastforge

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Install Fastforge
        run: |
          dart pub global activate fastforge
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
          fastforge --version
      
      - name: Setup signing files
        run: |
          mkdir -p ohos/signing
          printf '%s' "${{ secrets.SIGNING_CERT_BASE64 }}" | base64 --decode > ohos/signing/release.cer
          printf '%s' "${{ secrets.SIGNING_P12_BASE64 }}" | base64 --decode > ohos/signing/release.p12
          printf '%s' "${{ secrets.SIGNING_PROFILE_BASE64 }}" | base64 --decode > ohos/signing/release.p7b
          ls -la ohos/signing/
      
      - name: Configure build-profile.json5
        run: |
          echo '{' > ohos/build-profile.json5
          echo '  "app": {' >> ohos/build-profile.json5
          echo '    "signingConfigs": [' >> ohos/build-profile.json5
          echo '      {' >> ohos/build-profile.json5
          echo '        "name": "release",' >> ohos/build-profile.json5
          echo '        "type": "HarmonyOS",' >> ohos/build-profile.json5
          echo '        "material": {' >> ohos/build-profile.json5
          echo '          "certpath": "signing/release.cer",' >> ohos/build-profile.json5
          echo '          "storePassword": "'"${{ secrets.STORE_PASSWORD }}"'",' >> ohos/build-profile.json5
          echo '          "keyAlias": "'"${{ secrets.KEY_ALIAS }}"'",' >> ohos/build-profile.json5
          echo '          "keyPassword": "'"${{ secrets.KEY_PASSWORD }}"'",' >> ohos/build-profile.json5
          echo '          "profile": "signing/release.p7b",' >> ohos/build-profile.json5
          echo '          "signAlg": "SHA256withECDSA",' >> ohos/build-profile.json5
          echo '          "storeFile": "signing/release.p12"' >> ohos/build-profile.json5
          echo '        }' >> ohos/build-profile.json5
          echo '      }' >> ohos/build-profile.json5
          echo '    ],' >> ohos/build-profile.json5
          echo '    "products": [' >> ohos/build-profile.json5
          echo '      {' >> ohos/build-profile.json5
          echo '        "name": "default",' >> ohos/build-profile.json5
          echo '        "signingConfig": "release"' >> ohos/build-profile.json5
          echo '      }' >> ohos/build-profile.json5
          echo '    ]' >> ohos/build-profile.json5
          echo '  },' >> ohos/build-profile.json5
          echo '  "modules": [' >> ohos/build-profile.json5
          echo '    {' >> ohos/build-profile.json5
          echo '      "name": "entry",' >> ohos/build-profile.json5
          echo '      "srcPath": "./entry",' >> ohos/build-profile.json5
          echo '      "targets": [' >> ohos/build-profile.json5
          echo '        {' >> ohos/build-profile.json5
          echo '          "name": "default",' >> ohos/build-profile.json5
          echo '          "applyToProducts": ["default"]' >> ohos/build-profile.json5
          echo '        }' >> ohos/build-profile.json5
          echo '      ]' >> ohos/build-profile.json5
          echo '    }' >> ohos/build-profile.json5
          echo '  ]' >> ohos/build-profile.json5
          echo '}' >> ohos/build-profile.json5
          echo "build-profile.json5 configured"
      
      - name: Build HarmonyOS HAP
        run: |
          fastforge package --platform ohos --targets app --build-flavor release
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ohos-app-release
          path: |
            dist/*.hap
            dist/*.app
            **/*.hap
          retention-days: 30
      
      - name: Cleanup
        if: always()
        run: rm -rf ohos/signing/
