name: Build HarmonyOS App

on:
  workflow_dispatch:
  # push:
  #   branches: [ main, master ]
  # pull_request:
  #   branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Download Command Line Tools
        run: |
          mkdir -p ${{ github.workspace }}/command-line-tools
          cd ${{ github.workspace }}/command-line-tools
          echo "Downloading Command Line Tools from secret URL..."
          wget -q --show-progress --header "User-Agent: Mozilla/5.0" "${{ secrets.CMDLINE_TOOLS_URL }}" -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          rm cmdline-tools.zip
          echo "Command Line Tools downloaded and extracted."
          ls -la
      
      - name: Cache HarmonyOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/ohos-sdk
          key: ohos-sdk-6.1.0-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ohos-sdk-6.1.0-${{ runner.os }}-
      
      - name: Install HarmonyOS SDK via sdkmgr
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          export PATH="${{ github.workspace }}/command-line-tools/bin:$PATH"
          echo "${{ github.workspace }}/command-line-tools/bin" >> $GITHUB_PATH
          export HOS_SDK_HOME="${{ github.workspace }}/ohos-sdk"
          echo "HOS_SDK_HOME=$HOS_SDK_HOME" >> $GITHUB_ENV
          echo "Installing SDK components (this may take a few minutes)..."
          yes | sdkmgr install "ets:12" || true
          yes | sdkmgr install "ohos-sdk:5.0.0" || true
          echo "SDK installation finished."
      
      - name: Set SDK Environment
        run: |
          export HOS_SDK_HOME="${{ github.workspace }}/ohos-sdk"
          echo "HOS_SDK_HOME=$HOS_SDK_HOME" >> $GITHUB_ENV
          echo "${{ github.workspace }}/command-line-tools/bin" >> $GITHUB_PATH
          echo "SDK environment configured."
      
      - name: Cache Flutter OHOS SDK
        id: cache-flutter
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/flutter_ohos
          key: flutter-ohos-3.27.4-${{ runner.os }}
      
      - name: Setup Flutter OHOS SDK
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        run: |
          git clone https://gitcode.com/openharmony-tpc/flutter_flutter.git
          cd flutter_flutter
          git checkout br_3.27.4-ohos-1.0.4
          cd ..
          mv flutter_flutter flutter_ohos
      
      - name: Setup Flutter environment
        run: |
          export PATH="${{ github.workspace }}/flutter_ohos/bin:$PATH"
          echo "${{ github.workspace }}/flutter_ohos/bin" >> $GITHUB_PATH
          flutter --version
          dart --version
      
      - name: Cache Dart dependencies
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool
            .packages
            ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-dart-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-dart-
      
      - name: Get dependencies
        run: |
          export PATH="${{ github.workspace }}/flutter_ohos/bin:$PATH"
          export HOS_SDK_HOME="${{ github.workspace }}/ohos-sdk"
          flutter pub get
      
      - name: Setup signing files
        run: |
          mkdir -p ohos/signing
          printf '%s' "${{ secrets.SIGNING_CERT_BASE64 }}" | base64 --decode > ohos/signing/release.cer
          printf '%s' "${{ secrets.SIGNING_P12_BASE64 }}" | base64 --decode > ohos/signing/release.p12
          printf '%s' "${{ secrets.SIGNING_PROFILE_BASE64 }}" | base64 --decode > ohos/signing/release.p7b
          ls -la ohos/signing/
      
      - name: Configure build-profile.json5
        run: |
          echo '{' > ohos/build-profile.json5
          echo '  "app": {' >> ohos/build-profile.json5
          echo '    "signingConfigs": [' >> ohos/build-profile.json5
          echo '      {' >> ohos/build-profile.json5
          echo '        "name": "release",' >> ohos/build-profile.json5
          echo '        "type": "HarmonyOS",' >> ohos/build-profile.json5
          echo '        "material": {' >> ohos/build-profile.json5
          echo '          "certpath": "signing/release.cer",' >> ohos/build-profile.json5
          echo '          "storePassword": "'"${{ secrets.STORE_PASSWORD }}"'",' >> ohos/build-profile.json5
          echo '          "keyAlias": "'"${{ secrets.KEY_ALIAS }}"'",' >> ohos/build-profile.json5
          echo '          "keyPassword": "'"${{ secrets.KEY_PASSWORD }}"'",' >> ohos/build-profile.json5
          echo '          "profile": "signing/release.p7b",' >> ohos/build-profile.json5
          echo '          "signAlg": "SHA256withECDSA",' >> ohos/build-profile.json5
          echo '          "storeFile": "signing/release.p12"' >> ohos/build-profile.json5
          echo '        }' >> ohos/build-profile.json5
          echo '      }' >> ohos/build-profile.json5
          echo '    ],' >> ohos/build-profile.json5
          echo '    "products": [' >> ohos/build-profile.json5
          echo '      {' >> ohos/build-profile.json5
          echo '        "name": "default",' >> ohos/build-profile.json5
          echo '        "signingConfig": "release"' >> ohos/build-profile.json5
          echo '      }' >> ohos/build-profile.json5
          echo '    ]' >> ohos/build-profile.json5
          echo '  },' >> ohos/build-profile.json5
          echo '  "modules": [' >> ohos/build-profile.json5
          echo '    {' >> ohos/build-profile.json5
          echo '      "name": "entry",' >> ohos/build-profile.json5
          echo '      "srcPath": "./entry",' >> ohos/build-profile.json5
          echo '      "targets": [' >> ohos/build-profile.json5
          echo '        {' >> ohos/build-profile.json5
          echo '          "name": "default",' >> ohos/build-profile.json5
          echo '          "applyToProducts": ["default"]' >> ohos/build-profile.json5
          echo '        }' >> ohos/build-profile.json5
          echo '      ]' >> ohos/build-profile.json5
          echo '    }' >> ohos/build-profile.json5
          echo '  ]' >> ohos/build-profile.json5
          echo '}' >> ohos/build-profile.json5
          echo "build-profile.json5 configured"
      
      - name: Build HarmonyOS HAP
        run: |
          export PATH="${{ github.workspace }}/flutter_ohos/bin:$PATH"
          export HOS_SDK_HOME="${{ github.workspace }}/ohos-sdk"
          flutter build hap --release
      
      - name: Find and upload artifacts
        run: |
          echo "=== Build artifacts ==="
          find . -name "*.hap" -type f 2>/dev/null || echo "No .hap files found"
          find . -name "*.app" -type f 2>/dev/null || echo "No .app files found"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ohos-app-release
          path: |
            **/*.hap
            **/*.app
            build/ohos/hap/
          if-no-files-found: warn
          retention-days: 30
      
      - name: Cleanup
        if: always()
        run: |
          rm -rf ohos/signing/
          echo "Cleanup completed"
